<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yunlong Li – Resume</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
    }

    .lang-toggle {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 1000;
      display: flex;
      gap: 0;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .lang-toggle button {
      padding: 8px 18px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
      background: #fff;
      color: #555;
    }

    .lang-toggle button.active {
      background: #333;
      color: #fff;
    }

    .lang-toggle button:hover:not(.active) {
      background: #e8e8e8;
    }

    .resume-frame {
      width: 100%;
      height: calc(100vh - 0px);
      border: none;
      display: none;
    }

    .resume-frame.active {
      display: block;
    }

    @media print {
      .lang-toggle { display: none; }
      .resume-frame { height: auto; }
    }
  </style>
</head>
<body>
  <div class="lang-toggle">
    <button id="btn-en" class="active" onclick="switchLang('en')">EN</button>
    <button id="btn-de" onclick="switchLang('de')">DE</button>
  </div>

  <iframe id="frame-en" class="resume-frame active" src="resume.html"></iframe>
  <iframe id="frame-de" class="resume-frame" src="resume.de.html"></iframe>

  <script>
    const STORAGE_KEY = 'resume-lang';

    function switchLang(lang) {
      document.getElementById('frame-en').classList.toggle('active', lang === 'en');
      document.getElementById('frame-de').classList.toggle('active', lang === 'de');
      document.getElementById('btn-en').classList.toggle('active', lang === 'en');
      document.getElementById('btn-de').classList.toggle('active', lang === 'de');
      document.documentElement.lang = lang;
      localStorage.setItem(STORAGE_KEY, lang);
      window.history.replaceState(null, '', '?lang=' + lang);
    }

    function detectBrowserLang() {
      const browserLangs = navigator.languages && navigator.languages.length
        ? navigator.languages
        : [navigator.language || 'en'];

      return browserLangs.some(lang => lang.toLowerCase().startsWith('de')) ? 'de' : 'en';
    }

    const params = new URLSearchParams(window.location.search);
    const paramLang = params.get('lang');
    const savedLang = localStorage.getItem(STORAGE_KEY);
    const initialLang =
      paramLang === 'de' || paramLang === 'en'
        ? paramLang
        : savedLang === 'de' || savedLang === 'en'
          ? savedLang
          : detectBrowserLang();

    switchLang(initialLang);
  </script>
</body>
</html>
